name: PR to Master Test and Check
# Trigger version: 16 (Secure PR validation only)
on:
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-and-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Run Slicer Engine Cargo Tests
      run: |
        cd slicer-engine
        cargo test

    - name: Install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

    - name: Build Slicer Engine WASM
      run: |
        cd slicer-engine
        wasm-pack build --target web --out-dir ../frontend/src/lib/wasm-engine

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci
        npm run profiles:generate

    - name: Run Frontend Check
      run: |
        cd frontend
        npm run check