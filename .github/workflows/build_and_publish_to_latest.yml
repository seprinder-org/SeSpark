name: Build and Push Docker Image to GHCR
# Trigger version: 15 (Secure Open-Source Branch Trigger + Tagging + Deploy)
on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    environment: prod
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Slicer Engine Cargo Tests
        run: |
          cd slicer-engine
          cargo test

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build Slicer Engine WASM
        run: |
          cd slicer-engine
          wasm-pack build --target web --out-dir ../frontend/src/lib/wasm-engine

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Frontend Check
        run: |
          cd frontend
          npm run check

      - name: Create and push git tag
        id: create_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Fetch tags
          git fetch --tags
          
          # Get the latest tag
          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)
          echo "Latest tag found: $LATEST_TAG"
          
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v1.0.0"
          fi
          
          # Extract version parts
          if [[ "$LATEST_TAG" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            NEW_PATCH=$((PATCH + 1))
            NEW_TAG="v$MAJOR.$MINOR.$NEW_PATCH"
          else
            NEW_TAG="v1.0.1"
          fi
          
          echo "Creating new tag: $NEW_TAG"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.create_tag.outputs.new_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Clean up old GHCR images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Lấy danh sách các phiên bản package (mặc định đã sắp xếp từ mới nhất đến cũ nhất)
          VERSIONS=$(gh api orgs/seprinder-org/packages/container/sespark/versions?per_page=100)
          
          # Bỏ qua 3 bản đầu tiên (mới nhất), duyệt từ bản thứ 4 trở đi để xóa
          echo "$VERSIONS" | jq -c '.[]' | tail -n +4 | while read -r version; do
            ID=$(echo "$version" | jq -r '.id')
            TAGS=$(echo "$version" | jq -r '.metadata.container.tags[]?')
            
            # Kiểm tra xem có chứa tag 'latest' không
            IS_LATEST=false
            for tag in $TAGS; do
              if [ "$tag" = "latest" ]; then
                IS_LATEST=true
              fi
            done
            
            # Nếu không phải là latest, thực hiện xóa
            if [ "$IS_LATEST" = false ]; then
              echo "Deleting old package version ID: $ID (tags: $TAGS)"
              gh api --method DELETE orgs/seprinder-org/packages/container/sespark/versions/$ID || true
            else
              echo "Keeping version ID: $ID because it is tagged as latest"
            fi
          done

      - name: Trigger Deploy Workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run ssh_and_deploy_with_key.yml --ref master
