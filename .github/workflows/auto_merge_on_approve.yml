name: Auto Merge on Approve

on:
  pull_request_review:
    types: [submitted]

jobs:
  automerge:
    if: github.event.review.state == 'approved' && (github.event.review.author_association == 'OWNER' || github.event.review.author_association == 'COLLABORATOR' || github.event.review.author_association == 'MEMBER')
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge for approved PR
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.MODERATOR_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
