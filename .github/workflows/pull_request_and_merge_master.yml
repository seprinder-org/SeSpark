name: PR to Master Test and Auto Merge
# Trigger version: 12 (Secure Open-Source Configuration)
on:
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Run Slicer Engine Cargo Tests
      run: |
        cd slicer-engine
        cargo test

    - name: Install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

    - name: Build Slicer Engine WASM
      run: |
        cd slicer-engine
        wasm-pack build --target web --out-dir ../frontend/src/lib/wasm-engine

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Run Frontend Check
      run: |
        cd frontend
        npm run check

    - name: Enable Auto-Merge via GitHub Native Feature
      if: success()
      env:
        GH_TOKEN: ${{ github.token }} # Dùng token mặc định, an toàn tuyệt đối cho Open Source
      run: |
        echo "Các bài test đã pass xanh. Kích hoạt chế độ xếp hàng chờ Auto-Merge của GitHub..."
        # Lệnh này báo với GitHub: "Khi nào mọi điều kiện bảo vệ (Ruleset) thỏa mãn, hãy tự merge PR này lại"
        gh pr merge ${{ github.event.pull_request.number }} --merge --auto