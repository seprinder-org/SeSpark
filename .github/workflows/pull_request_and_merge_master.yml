name: PR to Master Test and Auto Merge
# Trigger version: 7 (Updated for GitHub Ruleset Compatibility)
on:
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-and-merge:
    environment: prod
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      checks: write
      pull-requests: write
      actions: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Run Slicer Engine Cargo Tests
      run: |
        cd slicer-engine
        cargo test

    - name: Install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

    - name: Build Slicer Engine WASM
      run: |
        cd slicer-engine
        wasm-pack build --target web --out-dir ../frontend/src/lib/wasm-engine

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Run Frontend Check
      run: |
        cd frontend
        npm run check
    - name: Approve PR
      if: success()
      env:
        GH_TOKEN: ${{ secrets.ADMIN_PAT }}
      run: |
        gh pr review ${{ github.event.pull_request.number }} --approve || echo "Could not approve PR (maybe owned by the same user), proceeding..."

    - name: Auto merge PR if tests pass
      if: success()
      env:
        # Sử dụng ADMIN_PAT thay vì github.token để bypass qua GitHub Ruleset
        GH_TOKEN: ${{ secrets.ADMIN_PAT }}
      run: |
        gh pr merge ${{ github.event.pull_request.number }} --merge --admin

    - name: Create and push git tag
      if: success()
      env:
        GH_TOKEN: ${{ secrets.ADMIN_PAT }}
      run: |
        # Cấu hình thông tin Git Bot
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # Cập nhật lại Remote URL chứa ADMIN_PAT để có quyền push lên Protected Branch
        git remote set-url origin https://x-access-token:${{ secrets.ADMIN_PAT }}@github.com/${{ github.repository }}.git
        
        # Đồng bộ danh sách thẻ
        git fetch --tags
        
        # Lấy tag mới nhất dựa trên phiên bản
        LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)
        echo "Latest tag found: $LATEST_TAG"
        
        # Khởi tạo tag mặc định nếu chưa từng có tag nào
        if [ -z "$LATEST_TAG" ]; then
          LATEST_TAG="v1.0.0"
        fi
        
        # Tự động tăng số Patch định dạng vX.Y.Z
        if [[ "$LATEST_TAG" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          NEW_PATCH=$((PATCH + 1))
          
          if [[ "$LATEST_TAG" == v* ]]; then
            NEW_TAG="v$MAJOR.$MINOR.$NEW_PATCH"
          else
            NEW_TAG="$MAJOR.$MINOR.$NEW_PATCH"
          fi
        else
          NEW_TAG="v1.0.1"
        fi
        
        echo "Creating new tag: $NEW_TAG"
        git tag "$NEW_TAG"
        git push origin "$NEW_TAG"
        
        echo "Triggering build and publish workflow for tag: $NEW_TAG"
        gh workflow run build_and_publish_to_master.yml --ref "$NEW_TAG"
