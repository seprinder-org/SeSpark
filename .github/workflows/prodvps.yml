# ==========================================
# DUMMY DEPLOY TRIGGER: Thay đổi số/chữ dưới đây (ví dụ: v1 -> v2) để tạo commit và trigger deploy khi cần.
# TRIGGER_VERSION: v1
# ==========================================

name: Build and Push Docker Image to GHCR

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # ==========================================
    # DÒNG BẬT/TẮT ĐIỀU KIỆN DEPLOY:
    # - Mở comment (#) dòng dưới để BẮT BUỘC commit message phải có chữ 'Build and push image' mới deploy.
    # - Đóng comment (#) dòng dưới để tự động deploy trên MỌI lượt push lên nhánh master.
    # ==========================================
    if: contains(github.event.head_commit.message, 'Build and push image')
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name for Docker
        run: |
          echo "IMAGE_NAME=ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
