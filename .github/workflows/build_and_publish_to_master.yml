name: Build and Push Docker Image to GHCR
# Trigger version: 1
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    environment: prod
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Clean up old GHCR images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Lấy danh sách các phiên bản package (mặc định đã sắp xếp từ mới nhất đến cũ nhất)
          VERSIONS=$(gh api orgs/seprinder-org/packages/container/sespark/versions?per_page=100)
          
          # Bỏ qua 3 bản đầu tiên (mới nhất), duyệt từ bản thứ 4 trở đi để xóa
          echo "$VERSIONS" | jq -c '.[]' | tail -n +4 | while read -r version; do
            ID=$(echo "$version" | jq -r '.id')
            TAGS=$(echo "$version" | jq -r '.metadata.container.tags[]?')
            
            # Kiểm tra xem có chứa tag 'latest' không
            IS_LATEST=false
            for tag in $TAGS; do
              if [ "$tag" = "latest" ]; then
                IS_LATEST=true
              fi
            done
            
            # Nếu không phải là latest, thực hiện xóa
            if [ "$IS_LATEST" = false ]; then
              echo "Deleting old package version ID: $ID (tags: $TAGS)"
              gh api --method DELETE orgs/seprinder-org/packages/container/sespark/versions/$ID || true
            else
              echo "Keeping version ID: $ID because it is tagged as latest"
            fi
          done

      - name: Trigger Deploy Workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run ssh_and_deploy_with_key.yml --ref master
